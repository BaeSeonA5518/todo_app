<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로젝트 홈</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='10' fill='%234f46e5'/%3E%3C/svg%3E"
      type="image/svg+xml"
    />
    <link rel="stylesheet" href="todo.css" />
    <style>
      .hub {
        position: relative;
        z-index: 1;
        max-width: 420px;
        margin: 0 auto;
        padding: 3rem 1.25rem;
        text-align: center;
      }
      .hub h1 {
        margin: 0 0 0.5rem;
        font-size: 1.35rem;
        font-weight: 700;
      }
      .hub p {
        margin: 0 0 1.75rem;
        font-size: 0.9rem;
        color: var(--td-muted);
      }
      .hub-links {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .hub-links a {
        display: block;
        padding: 0.9rem 1rem;
        border-radius: 14px;
        font-weight: 600;
        font-size: 0.92rem;
        text-decoration: none;
        border: 1px solid var(--td-line);
        background: var(--td-surface);
        box-shadow: var(--td-shadow);
        color: var(--td-accent);
        transition: border-color 0.15s ease, transform 0.1s ease;
      }
      .hub-links a:hover {
        border-color: var(--td-accent);
      }
      .hub-links a:active {
        transform: scale(0.99);
      }
      .hub-links a.secondary {
        color: var(--td-muted);
      }
    </style>
  </head>
  <body class="todo-page">
    <div class="todo-bg" aria-hidden="true"></div>
    <main class="hub">
      <h1>todo-firebase</h1>
      <p>세 페이지 모두 같은 Firebase Realtime DB 프로젝트에 연결돼요 (<code>todos</code>, <code>jobPrep</code>, <code>devGrind</code>).</p>
      <div class="hub-links">
        <a href="job-prep.html">AI·IT 취업 준비 보드</a>
        <a href="dev-grind.html" class="secondary">Don't think just do it (공부 플래너)</a>
        <a href="todo.html" class="secondary">Firebase 할일 앱</a>
      </div>
    </main>
  </body>
</html>
