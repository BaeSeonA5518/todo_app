  <body class="hub-page">
    <div class="hub-bg" aria-hidden="true">
      <div class="pointer-events-none absolute inset-0 overflow-hidden">

          <p class="hub-lead-line hub-lead-line--second">화면만 바꿔도 이어서 쓸 수 있어요</p>
        </div>

      <nav class="hub-cards hub-cards-stagger" aria-label="바로가기">
        <a class="hub-card hub-card--prep group" href="job-prep.html">

          >
            <svg
              class="h-5 w-5 transition-transform duration-300 ease-out group-hover:translate-x-0.5 motion-reduce:transition-none motion-reduce:group-hover:translate-x-0"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2.25"
              stroke-linecap="round"
              stroke-linejoin="round"

            <span class="hub-card-title">Don't think just do it</span>
            <p class="hub-card-desc">단계별 루틴, 타이머, 기록까지 — 공부 플래너</p>
          </div>
          <span
            class="hub-card-arrow inline-flex shrink-0 items-center justify-center self-center h-10 w-10 rounded-xl border border-indigo-100/90 bg-white/95 text-indigo-600 shadow-sm transition-all duration-300 ease-out group-hover:translate-x-1 group-hover:border-indigo-200 group-hover:bg-indigo-50 group-hover:shadow-md group-hover:shadow-indigo-500/15 group-active:scale-[0.97] motion-reduce:transition-none motion-reduce:group-hover:translate-x-0 motion-reduce:group-active:scale-100"

              stroke-width="2.25"
              stroke-linecap="round"

            >
              <path d="M5 12h14M13 5l7 7-7 7" />
            </svg>
          </span>
